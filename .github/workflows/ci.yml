name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: "temurin"
          cache: gradle

      - name: Build and unit tests
        run: ./gradlew build --no-daemon
        env:
          SEDNA_LLM_ENABLED: "false"

      - name: E2E suite
        run: ./gradlew e2e --no-daemon
        env:
          SEDNA_LLM_ENABLED: "false"

      - name: Determinism gates (fast)
        run: ./gradlew :tests:test --tests "io.sedna.tests.CiDeterminismTest" --tests "io.sedna.tests.GoldenFixtureReadmeShaTest" --no-daemon

      - name: Architecture and fuzz gates
        run: ./gradlew :tests:test --tests "io.sedna.tests.ModuleArchitectureTest" --tests "io.sedna.tests.EncodingFuzzTest" --tests "io.sedna.tests.MutationFuzzTest" --no-daemon

      - name: SEDNA-FOLD-v1 motif gates
        run: ./gradlew :sedna-dna:test --tests "io.sedna.dna.SednaFoldMotifCodecTest" :sedna-validation:test --tests "io.sedna.validation.SednaFoldEquivalenceTest" --no-daemon

  benchmarks:
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: "temurin"
          cache: gradle

      - name: JMH benchmarks
        run: ./gradlew :benchmarks:jmh --no-daemon

      - name: Verify performance thresholds
        run: bash benchmarks/verify-thresholds.sh benchmarks/build/results/jmh/results.json
