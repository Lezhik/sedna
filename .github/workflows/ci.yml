name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: "temurin"
          cache: gradle

      - name: Build and test
        run: ./gradlew build --no-daemon

      - name: Determinism gates
        run: ./gradlew :tests:test --tests "io.sedna.tests.CiDeterminismTest" --no-daemon

      - name: Architecture and fuzz gates
        run: ./gradlew :tests:test --tests "io.sedna.tests.ModuleArchitectureTest" --tests "io.sedna.tests.EncodingFuzzTest" --tests "io.sedna.tests.MutationFuzzTest" --no-daemon

      - name: Forward compile acceptance
        run: ./gradlew :tests:test --tests "io.sedna.tests.ForwardCompileIntegrationTest" --tests "io.sedna.tests.SpringBootMultiFixtureIntegrationTest" --tests "io.sedna.tests.SpringBootReverseForwardEquivalenceTest" --no-daemon

      - name: Golden fixture README SHA gate
        run: ./gradlew :tests:test --tests "io.sedna.tests.GoldenFixtureReadmeShaTest" --no-daemon

      - name: SEDNA-FOLD-v1 motif gates
        run: ./gradlew :sedna-dna:test --tests "io.sedna.dna.SednaFoldMotifCodecTest" :sedna-validation:test --tests "io.sedna.validation.SednaFoldEquivalenceTest" --no-daemon
